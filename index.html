<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I LOVE YOU KHALIZA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        #phase1-text, #phase4-text, #final-text {
            position: absolute;
            color: #ff1493;
            font-weight: bold;
            text-shadow: 0 0 10px #ff1493, 0 0 20px #ff1493;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
        }

        #phase1-text {
            font-size: 14px;
        }

        #phase4-text {
            font-size: 16px;
        }

        #final-text {
            font-size: 28px;
            color: #fff;
            text-shadow: 0 0 15px #ff1493, 0 0 30px #ff1493;
            opacity: 0;
            z-index: 100;
        }

        #countdown, #countdown2 {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 120px;
            color: #fff;
            text-shadow: 0 0 30px #ff1493, 0 0 60px #ff1493;
            opacity: 0;
            z-index: 50;
        }

        #text-sequence {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            color: #fff;
            text-shadow: 0 0 20px #ff1493;
            opacity: 0;
            z-index: 50;
        }

        .heart {
            position: absolute;
            color: #ff1493;
            font-size: 20px;
            opacity: 0.8;
            animation: fall linear forwards;
            z-index: 10;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 0.8;
            }
            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="phase1-container"></div>
    <div id="phase4-container"></div>
    <div id="countdown"></div>
    <div id="countdown2"></div>
    <div id="text-sequence"></div>
    <div id="final-text"></div>

    <script>
        // ============ CONFIGURATION ============
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Set canvas size
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ============ PHASE 1: Small "I love you" falling ============
        function createPhase1() {
            const container = document.getElementById('phase1-container');
            const numTexts = 80;
            
            for (let i = 0; i < numTexts; i++) {
                setTimeout(() => {
                    const span = document.createElement('div');
                    span.id = 'phase1-text';
                    span.textContent = 'I love you';
                    span.style.left = Math.random() * 95 + 2.5 + '%';
                    span.style.top = '-30px';
                    span.style.fontSize = (10 + Math.random() * 8) + 'px';
                    span.style.color = `hsl(${330 + Math.random() * 30)}, 100%, 70%)`;
                    span.style.opacity = 0.7 + Math.random() * 0.3;
                    container.appendChild(span);

                    // Animate falling
                    const duration = 3000 + Math.random() * 2000;
                    const startTime = Date.now();
                    
                    function animate() {
                        const elapsed = Date.now() - startTime;
                        const progress = elapsed / duration;
                        
                        if (progress < 1) {
                            // Fade out in the last 30%
                            if (progress > 0.7) {
                                span.style.opacity = (0.7 - (progress - 0.7) * 2.33) * (0.7 + Math.random() * 0.3);
                            }
                            span.style.top = (progress * (window.innerHeight + 100)) + 'px';
                            requestAnimationFrame(animate);
                        } else {
                            span.remove();
                        }
                    }
                    requestAnimationFrame(animate);
                }, i * 50);
            }
        }

        // ============ COUNTDOWN FUNCTION ============
        function showCountdown(callback) {
            const countdown = document.getElementById('countdown');
            let count = 3;
            
            countdown.style.opacity = 1;
            countdown.textContent = count;
            
            const interval = setInterval(() => {
                count--;
                if (count > 0) {
                    countdown.textContent = count;
                    countdown.style.transform = 'translate(-50%, -50%) scale(1.2)';
                    setTimeout(() => {
                        countdown.style.transform = 'translate(-50%, -50%) scale(1)';
                    }, 100);
                } else if (count === 0) {
                    countdown.textContent = count;
                } else {
                    clearInterval(interval);
                    countdown.style.opacity = 0;
                    if (callback) callback();
                }
            }, 1000);
        }

        // ============ FIREWORK EFFECT ============
        class Firework {
            constructor(x, y, targetX, targetY) {
                this.x = x;
                this.y = y;
                this.targetX = targetX;
                this.targetY = targetY;
                this.speed = 5;
                this.angle = Math.atan2(targetY - y, targetX - x);
                this.vx = Math.cos(this.angle) * this.speed;
                this.vy = Math.sin(this.angle) * this.speed;
                this.exploded = false;
                this.particles = [];
            }

            update() {
                if (!this.exploded) {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vy += 0.1;

                    if (this.y >= this.targetY || this.vy > 0) {
                        this.explode();
                    }
                } else {
                    for (let i = 0; i < this.particles.length; i++) {
                        this.particles[i].x += this.particles[i].vx;
                        this.particles[i].y += this.particles[i].vy;
                        this.particles[i].vy += 0.05;
                        this.particles[i].alpha -= 0.015;
                    }
                }
            }

            explode() {
                this.exploded = true;
                const colors = ['#ff1493', '#ff69b4', '#ffb6c1', '#fff', '#ffc0cb'];
                
                for (let i = 0; i < 100; i++) {
                    const angle = (Math.PI * 2 * i) / 100;
                    const speed = 2 + Math.random() * 4;
                    this.particles.push({
                        x: this.x,
                        y: this.y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        alpha: 1,
                        color: colors[Math.floor(Math.random() * colors.length)],
                        size: 2 + Math.random() * 3
                    });
                }
            }

            draw() {
                if (!this.exploded) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                    ctx.fillStyle = '#ff1493';
                    ctx.fill();
                } else {
                    for (let i = 0; i < this.particles.length; i++) {
                        if (this.particles[i].alpha > 0) {
                            ctx.beginPath();
                            ctx.arc(this.particles[i].x, this.particles[i].y, this.particles[i].size, 0, Math.PI * 2);
                            ctx.fillStyle = this.particles[i].color;
                            ctx.globalAlpha = this.particles[i].alpha;
                            ctx.fill();
                            ctx.globalAlpha = 1;
                        }
                    }
                }
            }

            isDone() {
                if (this.exploded) {
                    return this.particles.every(p => p.alpha <= 0);
                }
                return false;
            }
        }

        let fireworks = [];
        
        function createFireworks(num) {
            for (let i = 0; i < num; i++) {
                setTimeout(() => {
                    const x = Math.random() * canvas.width * 0.8 + canvas.width * 0.1;
                    const y = canvas.height * 0.3 + Math.random() * canvas.height * 0.3;
                    const targetY = canvas.height * 0.5 + Math.random() * canvas.height * 0.2;
                    fireworks.push(new Firework(x, canvas.height, x, targetY));
                }, i * 200);
            }
        }

        function animateFireworks() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = fireworks.length - 1; i >= 0; i--) {
                fireworks[i].update();
                fireworks[i].draw();
                
                if (fireworks[i].isDone()) {
                    fireworks.splice(i, 1);
                }
            }

            if (fireworks.length > 0 || animationPhase === 'firework1' || animationPhase === 'firework2') {
                requestAnimationFrame(animateFireworks);
            }
        }

        // ============ PHASE 4: "I love you" rain ============
        function createPhase4() {
            const container = document.getElementById('phase4-container');
            const texts = [
                'I love you KHALIZA',
                'I love you',
                'love you KHALIZA',
                'I love you Khaliza',
                'love you'
            ];
            
            const numTexts = 100;
            let completed = 0;
            const maxDuration = 8000;
            const startTime = Date.now();

            function createText() {
                if (Date.now() - startTime > maxDuration) return;
                
                const span = document.createElement('div');
                span.id = 'phase4-text';
                span.textContent = texts[Math.floor(Math.random() * texts.length)];
                span.style.left = Math.random() * 90 + 5 + '%';
                span.style.top = '-30px';
                span.style.fontSize = (12 + Math.random() * 10) + 'px';
                container.appendChild(span);

                const duration = 4000 + Math.random() * 2000;
                const startTime2 = Date.now();
                
                function animate() {
                    const elapsed = Date.now() - startTime2;
                    const progress = elapsed / duration;
                    
                    if (progress < 1) {
                        if (progress > 0.6) {
                            span.style.opacity = (1 - progress) * 2.5;
                        }
                        span.style.top = (progress * (window.innerHeight + 50)) + 'px';
                        requestAnimationFrame(animate);
                    } else {
                        span.remove();
                        completed++;
                    }
                }
                requestAnimationFrame(animate);
            }

            // Create texts continuously
            const Interval = setInterval(() => {
                if (Date.now() - startTime > maxDuration) {
                    clearInterval(Interval);
                } else {
                    createText();
                }
            }, 80);
        }

        // ============ TEXT SEQUENCE: YOU, ARE, MY, LOVE ============
        // Dots forming letters
        const letterPatterns = {
            'Y': [[0,0],[1,0.25],[2,0.5],[1,0.75],[0,1],[2,1],[0.5,0.5],[1.5,0.5]],
            'O': [[0,0],[1,0],[2,0],[0,0.5],[2,0.5],[0,1],[1,1],[2,1]],
            'U': [[0,0],[0,0.5],[0,1],[1,1],[2,1],[2,0.5],[2,0]],
            'R': [[0,0],[1,0],[2,0],[0,0.5],[2,0.5],[0,1],[1,1],[2,1.25]],
            'A': [[1,0],[0,0.5],[2,0.5],[0,1],[1,1],[2,1],[1,0.5]],
            'E': [[2,0],[0,0],[0,0.5],[1,0.5],[0,1],[2,1]],
            'M': [[0,1],[0,0],[1,0.5],[2,0],[2,1],[1,0.5]],
            'L': [[0,0],[0,1],[2,1]]
        };

        function drawDots(letter, centerX, centerY, size, color) {
            const pattern = letterPatterns[letter] || letterPatterns['O'];
            const scale = size;
            
            pattern.forEach(([xRatio, yRatio]) => {
                const x = centerX + (xRatio - 1) * scale;
                const y = centerY + (yRatio - 0.5) * scale;
                
                ctx.beginPath();
                ctx.arc(x, y, 6, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = color;
                ctx.fill();
                ctx.shadowBlur = 0;
            });
        }

        function showTextSequence() {
            return new Promise(resolve => {
                const sequence = ['Y', 'O', 'U', ' ', 'A', 'R', 'E', ' ', 'M', 'Y', ' ', 'L', 'O', 'V', 'E'];
                const textEl = document.getElementById('text-sequence');
                let index = 0;
                
                function showNext() {
                    if (index >= sequence.length) {
                        setTimeout(() => {
                            textEl.style.opacity = 0;
                            resolve();
                        }, 1000);
                        return;
                    }

                    const char = sequence[index];
                    if (char === ' ') {
                        index++;
                        showNext();
                        return;
                    }

                    // Clear and show new letter
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    drawDots(char, canvas.width / 2, canvas.height / 2, 80, '#fff');
                    
                    textEl.textContent = char;
                    textEl.style.opacity = 1;
                    textEl.style.color = '#fff';
                    
                    index++;
                    setTimeout(showNext, 600);
                }
                
                showNext();
            });
        }

        // ============ FIREWORK 2 ============
        function createFireworks2() {
            return new Promise(resolve => {
                let count = 0;
                const max = 8;
                
                function launch() {
                    if (count >= max) {
                        setTimeout(resolve, 2000);
                        return;
                    }
                    
                    for (let i = 0; i < 3; i++) {
                        setTimeout(() => {
                            const x = canvas.width * 0.2 + Math.random() * canvas.width * 0.6;
                            const targetY = canvas.height * 0.3 + Math.random() * canvas.height * 0.4;
                            fireworks.push(new Firework(x, canvas.height, x, targetY));
                        }, i * 150);
                    }
                    
                    count++;
                    setTimeout(launch, 800);
                }
                
                launch();
            });
        }

        // ============ HEART RAIN ============
        function createHeartRain() {
            const container = document.body;
            const finalText = document.getElementById('final-text');
            
            // Center text
            finalText.textContent = 'I LOVE YOU KHALIZA';
            finalText.style.left = '50%';
